name: Rust Fixtures

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  rust-fixtures:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Run Rust fixture regression harness
        run: bash scripts/run-rust-fixtures.sh

      - name: Publish job summary
        if: always()
        run: |
          cat output/rust-fixtures/latest.md >> "$GITHUB_STEP_SUMMARY"
          if [ -f output/rust-fixtures/comparison.md ]; then
            printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat output/rust-fixtures/comparison.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Rust fixture report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-fixture-report
          path: output/rust-fixtures/
