<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fire Summary</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body data-surface="page">
    <main class="app">
      <header class="hero">
        <h1>Fire Summary</h1>
      </header>

      <div class="actions">
        <button id="summarize-button" type="button">複製摘要</button>
        <button id="copy-article-button" type="button" class="secondary">複製全文</button>
      </div>

      <section class="panel">
        <p id="status" class="status">
          <span class="status-spinner" aria-hidden="true"></span>
          <span class="status-text">等待操作</span>
        </p>
        <h2 id="article-title" class="title"></h2>
        <div id="summary" class="summary empty">尚未產生摘要。</div>
      </section>

      <button id="open-settings-button" type="button" class="ghost">設定</button>
      <button id="open-discussion-button" type="button" class="ghost">延伸討論</button>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
