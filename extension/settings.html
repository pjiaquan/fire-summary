<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fire Summary Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Settings</p>
        <h1>Fire Summary</h1>
        <p class="lead">管理 Gemini API、目標語言、Prompt 與 shortcut 偏好。</p>
      </section>

      <form id="settings-form" class="panel">
        <label class="field">
          <span class="label">API Provider</span>
          <select id="provider" name="provider">
            <option value="google_gemini">Google Gemini</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Model</span>
          <input id="model" name="model" type="text" list="model-options" placeholder="例如：gemini-2.5-flash" />
          <datalist id="model-options">
            <option value="gemini-3.1-pro-preview"></option>
            <option value="gemini-3-flash-preview"></option>
            <option value="gemini-3.1-flash-lite-preview"></option>
            <option value="gemini-2.5-flash"></option>
            <option value="gemini-2.5-pro"></option>
            <option value="gemini-2.5-flash-lite"></option>
          </datalist>
        </label>

        <label class="field">
          <span class="label">Fallback Model</span>
          <select id="fallback-model" name="fallbackModel">
            <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
            <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
            <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite-preview</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
            <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
            <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
          </select>
          <span class="hint">當主模型失效或不存在時，自動改用這個模型。</span>
        </label>

        <label class="field">
          <span class="label">Gemini API Key</span>
          <input id="api-key" name="apiKey" type="password" placeholder="AIza..." autocomplete="off" />
          <a
            class="link"
            href="https://aistudio.google.com/app/apikey"
            target="_blank"
            rel="noreferrer"
          >
            前往 Google AI Studio 取得 API Key
          </a>
        </label>

        <label class="field">
          <span class="label">Target Language</span>
          <input
            id="target-language"
            name="targetLanguage"
            type="text"
            list="target-language-options"
            placeholder="選擇或輸入目標語言"
          />
          <datalist id="target-language-options"></datalist>
        </label>

        <label class="field">
          <span class="label">Custom Prompt</span>
          <textarea
            id="custom-prompt"
            name="customPrompt"
            rows="7"
            placeholder="輸入你希望摘要時附加的提示，例如：請用產品經理視角整理重點與行動項目。"
          ></textarea>
        </label>

        <section class="cache-box">
          <p class="label">Shortcut</p>
          <p class="hint">預設快捷鍵是 `Alt+X`，會直接開啟 Fire Summary popup 並自動開始摘要。</p>
          <p class="hint">如果要修改快捷鍵，請到瀏覽器的 extension shortcuts 設定頁調整。</p>
        </section>

        <label class="field">
          <span class="label">Font Size</span>
          <select id="font-size" name="fontSize">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
          </select>
        </label>

        <label class="toggle-field" for="stream-output">
          <span>
            <span class="label">Stream Output</span>
            <span class="hint">勾選後會改用 Gemini streaming API，即時回填摘要內容。</span>
          </span>
          <input id="stream-output" name="streamOutput" type="checkbox" />
        </label>

        <label class="toggle-field" for="auto-export-txt">
          <span>
            <span class="label">Auto Export TXT</span>
            <span class="hint">摘要完成後自動下載 `.txt`，檔名會用 AI 產生的標題。</span>
          </span>
          <input id="auto-export-txt" name="autoExportTxt" type="checkbox" />
        </label>

        <section class="cache-box">
          <p class="label">Cache Protection</p>
          <p class="hint">
            只快取 AI 摘要結果，不保存全文。快取會自動套用有效期與筆數上限，超出會自動清理。
          </p>
          <button id="clear-cache-button" type="button" class="secondary-button">清空摘要快取</button>
        </section>

        <div class="footer">
          <p id="save-status" class="save-status">尚未儲存</p>
          <button id="save-button" type="submit">儲存設定</button>
        </div>
      </form>
    </main>

    <script type="module" src="settings.js"></script>
  </body>
</html>
